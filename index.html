<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
body {
  background: #1a1a1a;
  color: white;
  font-family: sans-serif;
}

#characterList {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  background: #2c2c2c;
  border-radius: 12px;
  width: 260px;
  padding: 15px;
  box-shadow: 0 0 12px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.card:hover {
  box-shadow: 0 0 20px #4caf50;
}

.card h2 {
  margin: 0;
  font-size: 20px;
}

.section {
  margin-top: 10px;
  font-size: 14px;
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  margin: 2px;
  border-radius: 6px;
  font-size: 12px;
  background: #444;
}

.ability {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.bar {
  height: 6px;
  background: #555;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 3px;
}

.fill {
  height: 100%;
  background: #4caf50;
}

button {
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.tabs {
  margin-bottom: 10px;
}

.tabs button {
  padding: 10px;
  margin-right: 5px;
  border: none;
  background: #444;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.tabs button:hover {
  background: #666;
}

.tab {
  padding: 10px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

</style>
<meta charset="UTF-8">
<title>ウタカゼ キャラシート</title>
</head>
<body>

<h1>キャラクター作成</h1>

<!-- タブ -->
<div class="tabs">
  <button onclick="showTab('basic')">基本</button>
  <button onclick="showTab('status')">能力</button>
  <button onclick="showTab('skills')">技能</button>
  <button onclick="showTab('items')">持ち物</button>
</div>

<!-- 基本 -->
<div id="basic" class="tab">
  <input id="name" placeholder="キャラクター名"><br>
  <input id="head" placeholder="頭の装飾"><br>
  <input id="cloth" placeholder="服の装飾"><br>
  <input id="hair" placeholder="髪の色"><br>
  <input id="eye" placeholder="瞳の色"><br>
  <input id="skin" placeholder="肌の色"><br>
  <input id="range" placeholder="飛び道具名"><br>
  <input id="melee" placeholder="近接武器名"><br>
  <input id="instrument" placeholder="楽器名"><br>
</div>

<!-- 能力 -->
<div id="status" class="tab" style="display:none;">
  <input id="hp" type="number" placeholder="HP"><br>

  勇気:<select id="yuki"></select>
  知恵:<select id="chie"></select>
  愛情:<select id="aijo"></select>

  龍ダイス:<select id="dragon"></select>
</div>

<!-- 技能 -->
<div id="skills" class="tab" style="display:none;">
  戦い <input class="skill" id="tatakai"><br>
  冒険 <input class="skill" id="bouken"><br>
  騎乗 <input class="skill" id="kijou"><br>
  狩り <input class="skill" id="kari"><br>
  感覚 <input class="skill" id="kankaku"><br>
  学問 <input class="skill" id="gakumon"><br>
  歌 <input class="skill" id="uta"><br>
  説得 <input class="skill" id="settoku"><br>
  心話 <input class="skill" id="shinwa"><br>
</div>

<!-- 持ち物 -->
<div id="itemsTab" class="tab" style="display:none;">
  <div id="items"></div>
  <button onclick="addItem()">追加</button>
</div>

<br>
<button onclick="saveCharacter()">保存</button>

<div id="characterList"></div>

<script type="module" src="app.js"></script>
</body>
</html>
