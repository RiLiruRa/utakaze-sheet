<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウタカゼ キャラシート作成</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #5d4037;
            --leather-brown: #8d6e63;
            --paper-white: #fffaf0;
            --forest-green: #689f38;
            --accent-red: #e57373;
            --accent-blue: #546e7a;
        }

        body {
            background-color: #fdf5e6;
            background-image: radial-gradient(#eddec1 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--primary-brown);
            font-family: 'Zen Maru Gothic', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            border-bottom: 3px double var(--leather-brown);
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0 white;
        }

        /* メインコンテナ */
        .container {
            width: 100%;
            max-width: 600px;
        }

        /* 現在のモード表示スタンプ */
        .status-badge {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--leather-brown);
            background: #f5eadd;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px dashed var(--leather-brown);
            display: inline-block;
        }

        /* アコーディオン設定 */
        .section {
            background: var(--paper-white);
            border: 2px solid #d7ccc8;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header {
            background: var(--leather-brown);
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .header:hover { background: var(--primary-brown); }

        .content {
            display: none; /* JSで制御 */
            padding: 20px;
            background: var(--paper-white);
        }

        /* 入力要素の装飾 */
        .input-group { margin-bottom: 10px; }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 4px; }
        
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bcaaa4;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="number"] { width: 80px; }
        .skill-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .skill-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #d7ccc8; padding: 4px 0; }

        /* ボタンデザイン */
        .btn-area { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        button {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #33691e;
            font-family: inherit;
            transition: all 0.1s;
        }

        button:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-ccf { background: var(--accent-blue); box-shadow: 0 4px 0 #263238; }

        /* キャラクター一覧セクション */
        .guild-board {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            border-top: 2px dashed var(--leather-brown);
            padding-top: 20px;
        }

        .guild-board h2 {
            text-align: center;
            font-size: 1.4rem;
            color: var(--primary-brown);
            margin-bottom: 20px;
        }

        /* キャラクターカード一覧 */
        #characterList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: var(--paper-white);
            border: 2px solid var(--leather-brown);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--primary-brown); border-bottom: 1px solid #d7ccc8; padding-bottom: 5px; }

        /* ココフォリア出力エリア */
        #ccfOutput {
            margin-top: 15px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #bcaaa4;
            padding: 10px;
            background: #f8f8f8;
            font-family: monospace;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>🍃 ウタカゼ 勇者の記録帳</h1>
    
    <!-- 現在の編集状態を示すランプ -->
    <div class="status-badge" id="editStatus">🍃 今は【新規作成モード】だよ</div>

    <div class="container">
        <!-- 基本情報 -->
        <div class="section">
            <div class="header" onclick="toggleSection(this)">基本情報 <span>▼</span></div>
            <div class="content">
                <div class="input-group"><label>名まえ</label><input id="name" placeholder="勇者の名前"></div>
                <div class="input-group"><label>頭の装飾</label><input id="head"></div>
                <div class="input-group"><label>服の装飾</label><input id="cloth"></div>
                <div class="input-group"><label>髪の色</label><input id="hair"></div>
                <div class="input-group"><label>瞳の色</label><input id="eye"></div>
                <div class="input-group"><label>肌の色</label><input id="skin"></div>
                <hr style="border: 0; border-top: 1px dashed #d7ccc8; margin: 15px 0;">
                <div class="input-group"><label>飛び道具名</label><input id="range"></div>
                <div class="input-group"><label>近接武器名</label><input id="melee"></div>
                <div class="input-group"><label>楽器名</label><input id="instrument"></div>
            </div>
        </div>

        <!-- 能力値 -->
        <div class="section">
            <div class="header" onclick="toggleSection(this)">能力値 <span>▼</span></div>
            <div class="content">
                <div class="input-group"><label>希望 (HP)</label><input id="hp" type="number" value="10"></div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                    <div>勇気 <select id="yuki" style="width: auto;"></select></div>
                    <div>知恵 <select id="chie" style="width: auto;"></select></div>
                    <div>愛情 <select id="aijo" style="width: auto;"></select></div>
                    <div>龍ダイス <select id="dragon" style="width: auto;"></select></div>
                </div>
            </div>
        </div>

        <!-- 技能 -->
        <div class="section">
            <div class="header" onclick="toggleSection(this)">技能 <span>▼</span></div>
            <div class="content">
                <div class="skill-list">
                    <div class="skill-item"><span>戦い</span><input class="skill" id="tatakai" type="number" value="0"></div>
                    <div class="skill-item"><span>冒険</span><input class="skill" id="bouken" type="number" value="0"></div>
                    <div class="skill-item"><span>騎乗</span><input class="skill" id="kijou" type="number" value="0"></div>
                    <div class="skill-item"><span>狩り</span><input class="skill" id="kari" type="number" value="0"></div>
                    <div class="skill-item"><span>感覚</span><input class="skill" id="kankaku" type="number" value="0"></div>
                    <div class="skill-item"><span>学問</span><input class="skill" id="gakumon" type="number" value="0"></div>
                    <div class="skill-item"><span>歌</span><input class="skill" id="uta" type="number" value="0"></div>
                    <div class="skill-item"><span>説得</span><input class="skill" id="settoku" type="number" value="0"></div>
                    <div class="skill-item"><span>心話</span><input class="skill" id="shinwa" type="number" value="0"></div>
                </div>
            </div>
        </div>

        <!-- 持ち物 -->
        <div class="section">
            <div class="header" onclick="toggleSection(this)">持ち物 (リュック) <span>▼</span></div>
            <div class="content">
                <div id="items"></div>
                <button onclick="addItem()" style="background:var(--leather-brown); padding: 5px 15px; font-size: 0.8rem; margin-top: 10px; box-shadow: 0 3px 0 #5d4037;">＋ 道具を追加</button>
            </div>
        </div>

        <!-- 操作ボタンエリア -->
        <div class="btn-area">
            <button onclick="saveCharacter()">✨ ギルドに保存</button>
            <button onclick="exportCCF()" class="btn-ccf">📋 ココフォリア出力</button>
        </div>

        <textarea id="ccfOutput" rows="5" placeholder="ここにココフォリア用データが出力されます"></textarea>
    </div>

    <!-- キャラクター一覧（ギルドの掲示板風） -->
    <div class="guild-board">
        <h2>📜 登録された勇者たちの一覧</h2>
        <div id="characterList"><!-- ここにJSでカードが追加されます --></div>
    </div>

    <!-- 外部スクリプトの読み込み -->
    <script type="module" src="app.js"></script>

    <script>
        // アコーディオン開閉用の関数
        function toggleSection(header) {
            const content = header.nextElementSibling;
            const isOpen = content.style.display === "block";
            content.style.display = isOpen ? "none" : "block";
            header.querySelector('span').innerText = isOpen ? "▼" : "▲";
        }
    </script>
</body>
</html>
